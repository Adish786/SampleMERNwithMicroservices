apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
          image: gcr.io/heroviredacademics/profile-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            # Hardcode MONGO_URL with known credentials (admin/password)
            - name: MONGO_URL
              value: "mongodb://admin:password@mongodb-service.default.svc.cluster.local:27017"
          # Readiness probe – ensures pod is only added to load balancer when /health responds
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
spec:
  selector:
    app: profile-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP